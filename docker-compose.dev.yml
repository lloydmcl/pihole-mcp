# Local Pi-hole v6 instance for MCP server development and testing.
# Usage: docker compose -f docker-compose.dev.yml up -d --wait
# Web UI: http://localhost:8081/admin
# API: http://localhost:8081/api/
# API Docs: http://localhost:8081/api/docs
# Password: test

services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole-dev
    ports:
      - "8081:80"       # Web UI + API
      - "5354:53/udp"   # DNS (non-standard port to avoid conflicts)
      - "5354:53/tcp"
    environment:
      TZ: "UTC"
      FTLCONF_webserver_api_password: "test"
      FTLCONF_webserver_api_max_sessions: "128"
      FTLCONF_dns_listeningMode: "single"
    volumes:
      - pihole_config:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/admin/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 45s
    restart: unless-stopped

volumes:
  pihole_config:
  pihole_dnsmasq:
