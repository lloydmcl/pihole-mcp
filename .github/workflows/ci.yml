name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: "v2.11"

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o /dev/null ./cmd/pihole-mcp

  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o /dev/null ./cmd/pihole-mcp

  integration:
    needs: validate
    runs-on: ubuntu-latest
    services:
      pihole:
        image: pihole/pihole:latest
        ports:
          - 8081:80
        env:
          FTLCONF_webserver_api_password: test
          FTLCONF_dns_listeningMode: single
        options: >-
          --health-cmd "curl -sf http://localhost/api/info/version || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Integration tests
        env:
          PIHOLE_URL: http://localhost:8081
          PIHOLE_PASSWORD: test
        run: go test -tags=integration -race -count=1 ./internal/pihole/
