version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "github.com/mark3labs/mcp-go"
    labels:
      - "dependencies"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels:
      - "dependencies"
      - "docker"
