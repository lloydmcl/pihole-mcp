name: Bug Report
description: Report a bug or unexpected behaviour
title: "[Bug] "
labels: [bug]

body:
  - type: checkboxes
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true

  - type: textarea
    attributes:
      label: Environment
      description: Pi-hole and MCP server versions, MCP client, and operating system.
      placeholder: |
        pihole-mcp version: v0.1.0
        Pi-hole version: v6.6
        MCP client: Claude Desktop / Cursor / Windsurf / other
        OS: macOS 15.4 / Ubuntu 24.04 / Windows 11
    validations:
      required: true

  - type: textarea
    attributes:
      label: Description
      description: Clear description of what isn't working.
      placeholder: When I try to ..., the tool returns ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behaviour?
      placeholder: |
        1. Configure pihole-mcp with ...
        2. Call tool pihole_... with arguments ...
        3. Observe error ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Error output
      description: Paste any error messages or logs. Redact credentials.
      render: shell
    validations:
      required: false
