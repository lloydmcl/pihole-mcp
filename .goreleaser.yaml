version: 2

project_name: pihole-mcp

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/pihole-mcp
    binary: pihole-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/lloydmcl/pihole-mcp/internal/server.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

dockers_v2:
  - images:
      - "ghcr.io/lloydmcl/pihole-mcp"
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    build_args:
      VERSION: "{{ .Version }}"
      COMMIT: "{{ .FullCommit }}"
      DATE: "{{ .Date }}"
    dockerfile: Dockerfile.goreleaser

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix"
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  draft: true
  prerelease: auto
